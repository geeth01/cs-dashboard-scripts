bucket: sanity-reports-and-screenshots

# S3 prefix = {environment}{sanityCode}  e.g. gcpProd + VenusUIAssets = gcpProdVenusUIAssets
#
# To add a new sanity: copy any block, fill name + codes, set enabled: true.
# To skip an environment for a sanity: leave its value as "".
# To disable a whole sanity: set enabled: false.
#
# Run discover_prefixes.py (on VPN) to verify prefixes actually exist in the bucket.

